<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="Illustration Baureinigung">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eef8fd"/>
      <stop offset="1" stop-color="#d8eefb"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <circle cx="400" cy="300" r="230" fill="#ffffff" opacity="0.55"/>

  <path d="M0 500 h800 v100 H0 z" fill="#dcf0fb"/>

  <!-- Kran -->
  <g stroke="#16243d" stroke-width="10" stroke-linecap="round">
    <path d="M620 500 V 120"/>
    <path d="M470 120 H 750"/>
    <path d="M620 160 L 580 120 M620 200 L 660 120"/>
  </g>
  <path d="M500 120 V 190" stroke="#219cd8" stroke-width="6"/>
  <rect x="482" y="190" width="36" height="30" rx="6" fill="#219cd8"/>

  <!-- Rohbau -->
  <g>
    <rect x="120" y="220" width="330" height="280" rx="10" fill="#223a58"/>
    <g fill="#d8eefb">
      <rect x="150" y="250" width="70" height="70" rx="6"/>
      <rect x="250" y="250" width="70" height="70" rx="6"/>
      <rect x="350" y="250" width="70" height="70" rx="6"/>
      <rect x="150" y="350" width="70" height="70" rx="6"/>
      <rect x="250" y="350" width="70" height="70" rx="6"/>
      <rect x="350" y="350" width="70" height="70" rx="6"/>
    </g>
    <!-- gereinigte Fenster -->
    <g fill="#45b3e7">
      <rect x="150" y="250" width="70" height="70" rx="6"/>
      <rect x="250" y="250" width="70" height="70" rx="6"/>
    </g>
    <path d="M168 302 L 198 262" stroke="#ffffff" stroke-width="6" stroke-linecap="round" opacity="0.8"/>
  </g>

  <!-- Warnkegel -->
  <g>
    <path d="M540 500 l 22 -70 a 8 8 0 0 1 16 0 l 22 70 z" fill="#219cd8"/>
    <path d="M552 462 h 52" stroke="#ffffff" stroke-width="10"/>
    <rect x="524" y="496" width="92" height="14" rx="7" fill="#16243d"/>
  </g>

  <!-- Besen + Staub -->
  <g transform="rotate(-20 700 430)">
    <path d="M700 250 L 700 430" stroke="#16243d" stroke-width="9" stroke-linecap="round"/>
    <path d="M676 430 h 48 l 10 24 h -68 z" fill="#219cd8"/>
    <g stroke="#45b3e7" stroke-width="7" stroke-linecap="round">
      <path d="M676 458 l -4 22"/>
      <path d="M692 458 l -2 26"/>
      <path d="M708 458 l 2 26"/>
      <path d="M724 458 l 4 22"/>
    </g>
  </g>
  <g fill="#98c9e8" opacity="0.8">
    <circle cx="620" cy="540" r="6"/>
    <circle cx="648" cy="552" r="4"/>
    <circle cx="600" cy="556" r="4.5"/>
  </g>
  <path d="M560 540 q 60 20 130 6" stroke="#ffffff" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.9"/>

  <!-- Funkeln -->
  <g fill="#219cd8">
    <path d="M90 140c2.6 12 7.8 17.2 20 20-12.2 2.6-17.4 7.8-20 20-2.6-12.2-7.8-17.4-20-20 12.2-2.8 17.4-8 20-20z" opacity="0.85"/>
  </g>
</svg>
