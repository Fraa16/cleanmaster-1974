<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="Illustration Taubenabwehr">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eef8fd"/>
      <stop offset="1" stop-color="#d8eefb"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <circle cx="400" cy="300" r="230" fill="#ffffff" opacity="0.55"/>

  <!-- Wolken -->
  <g fill="#ffffff" opacity="0.9">
    <path d="M560 110a24 24 0 0 1 46-7 18 18 0 0 1 26 16h-88a20 20 0 0 1 16-9z"/>
  </g>

  <!-- Fassade -->
  <rect x="80" y="260" width="640" height="340" fill="#223a58"/>
  <rect x="80" y="260" width="640" height="22" fill="#16243d"/>
  <g fill="#45b3e7">
    <rect x="140" y="330" width="110" height="130" rx="8"/>
    <rect x="340" y="330" width="110" height="130" rx="8"/>
    <rect x="540" y="330" width="110" height="130" rx="8"/>
  </g>
  <g fill="#eaf6fd">
    <rect x="140" y="330" width="110" height="14" rx="7"/>
    <rect x="340" y="330" width="110" height="14" rx="7"/>
    <rect x="540" y="330" width="110" height="14" rx="7"/>
  </g>

  <!-- Sims mit Spikes -->
  <rect x="60" y="238" width="680" height="26" rx="10" fill="#16243d"/>
  <g stroke="#219cd8" stroke-width="6" stroke-linecap="round">
    <path d="M110 234 l 0 -30 M100 216 l 10 -12 l 10 12"/>
  </g>
  <g stroke="#98c9e8" stroke-width="5" stroke-linecap="round" fill="none">
    <path d="M150 236 L 150 206 M190 236 L 190 206 M230 236 L 230 206 M270 236 L 270 206 M310 236 L 310 206 M350 236 L 350 206 M390 236 L 390 206 M430 236 L 430 206 M470 236 L 470 206 M510 236 L 510 206 M550 236 L 550 206 M590 236 L 590 206 M630 236 L 630 206 M670 236 L 670 206"/>
  </g>

  <!-- Wegfliegende Tauben -->
  <g stroke="#16243d" stroke-width="5" stroke-linecap="round" fill="none">
    <path d="M240 130 q 14 -18 28 0 q 14 -18 28 0"/>
    <path d="M540 160 q 11 -14 22 0 q 11 -14 22 0" opacity="0.75"/>
    <path d="M420 100 q 9 -12 18 0 q 9 -12 18 0" opacity="0.6"/>
    <path d="M660 110 q 8 -10 16 0 q 8 -10 16 0" opacity="0.5"/>
  </g>

  <!-- Schutzschild-Symbol -->
  <g transform="translate(400 480)">
    <path d="M0 -46 L 34 -32 v 24 c0 24 -17 41 -34 48 -17 -7 -34 -24 -34 -48 v -24 z" fill="#219cd8"/>
    <path d="m-14 -4 10 10 20 -22" fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
