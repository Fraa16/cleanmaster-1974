<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="Illustration Winterdienst">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#dfeffb"/>
      <stop offset="1" stop-color="#c6e2f5"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <circle cx="400" cy="300" r="230" fill="#ffffff" opacity="0.4"/>

  <!-- Haus -->
  <g>
    <rect x="150" y="240" width="300" height="220" rx="10" fill="#223a58"/>
    <path d="M130 250 L 300 130 L 470 250 z" fill="#16243d"/>
    <path d="M130 250 L 300 130 L 470 250" fill="none" stroke="#ffffff" stroke-width="16" stroke-linecap="round"/>
    <rect x="190" y="280" width="70" height="70" rx="7" fill="#45b3e7"/>
    <rect x="340" y="280" width="70" height="70" rx="7" fill="#45b3e7"/>
    <rect x="262" y="370" width="76" height="90" rx="8" fill="#219cd8"/>
  </g>

  <!-- Schneedecke Boden -->
  <path d="M0 460 h800 v140 H0 z" fill="#ffffff"/>
  <!-- geräumter Weg -->
  <path d="M262 460 q 30 60 200 90 q 120 22 220 20 L 800 600 L 262 600 z" fill="#b5e0f7"/>
  <path d="M262 460 q 30 60 200 90 q 120 22 220 20" fill="none" stroke="#98c9e8" stroke-width="5" stroke-dasharray="2 14" stroke-linecap="round"/>

  <!-- Schneehaufen -->
  <path d="M60 600 q 10 -70 70 -70 q 55 0 66 70 z" fill="#eaf6fd"/>
  <path d="M560 520 q 8 -44 46 -44 q 36 0 44 44 z" fill="#eaf6fd" opacity="0"/>

  <!-- Schneeschieber -->
  <g transform="rotate(14 600 380)">
    <path d="M600 250 L 600 430" stroke="#16243d" stroke-width="10" stroke-linecap="round"/>
    <rect x="582" y="222" width="36" height="20" rx="10" fill="#16243d"/>
    <path d="M560 430 h 80 a 10 10 0 0 1 10 10 v 34 a 10 10 0 0 1 -10 10 h -80 a 10 10 0 0 1 -10 -10 v -34 a 10 10 0 0 1 10 -10 z" fill="#219cd8"/>
    <path d="M550 470 h 100 v 8 a 8 8 0 0 1 -8 8 h -84 a 8 8 0 0 1 -8 -8 z" fill="#167eb4"/>
  </g>

  <!-- Streugut -->
  <g fill="#219cd8">
    <circle cx="380" cy="520" r="5"/>
    <circle cx="420" cy="545" r="4"/>
    <circle cx="460" cy="525" r="4.5"/>
    <circle cx="510" cy="550" r="4"/>
    <circle cx="340" cy="500" r="4"/>
  </g>

  <!-- Schneeflocken -->
  <g stroke="#ffffff" stroke-width="3.4" stroke-linecap="round">
    <g transform="translate(120,120)"><path d="M0 -18 V 18 M-18 0 H 18 M-12 -12 L 12 12 M-12 12 L 12 -12"/></g>
    <g transform="translate(560,90) scale(0.7)"><path d="M0 -18 V 18 M-18 0 H 18 M-12 -12 L 12 12 M-12 12 L 12 -12"/></g>
    <g transform="translate(680,190) scale(0.55)"><path d="M0 -18 V 18 M-18 0 H 18 M-12 -12 L 12 12 M-12 12 L 12 -12"/></g>
    <g transform="translate(60,320) scale(0.6)"><path d="M0 -18 V 18 M-18 0 H 18 M-12 -12 L 12 12 M-12 12 L 12 -12"/></g>
    <g transform="translate(520,200) scale(0.45)"><path d="M0 -18 V 18 M-18 0 H 18 M-12 -12 L 12 12 M-12 12 L 12 -12"/></g>
  </g>
</svg>
