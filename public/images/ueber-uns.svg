  <g fill="#219cd8">
    <path d="M120 300c2.6 12 7.8 17.2 20 20-12.2 2.6-17.4 7.8-20 20-2.6-12.2-7.8-17.4-20-20 12.2-2.8 17.4-8 20-20z" opacity="0.8"/>
    <path d="M680 320c1.8 8.4 5.5 12 14 14-8.5 1.8-12.2 5.5-14 14-1.8-8.5-5.5-12.2-14-14 8.5-2 12.2-5.6 14-14z" opacity="0.7"/>
