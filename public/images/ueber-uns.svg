<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="Illustration Familienbetrieb Cleanmaster 1974">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eef8fd"/>
      <stop offset="1" stop-color="#d8eefb"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <circle cx="400" cy="300" r="230" fill="#ffffff" opacity="0.55"/>

  <path d="M0 500 h800 v100 H0 z" fill="#dcf0fb"/>

  <!-- Firmengebäude -->
  <g>
    <rect x="230" y="200" width="340" height="300" rx="12" fill="#223a58"/>
    <rect x="230" y="200" width="340" height="26" rx="12" fill="#16243d"/>
    <g fill="#45b3e7">
      <rect x="264" y="256" width="80" height="70" rx="7"/>
      <rect x="456" y="256" width="80" height="70" rx="7"/>
      <rect x="264" y="356" width="80" height="70" rx="7"/>
      <rect x="456" y="356" width="80" height="70" rx="7"/>
    </g>
    <rect x="362" y="380" width="76" height="120" rx="9" fill="#219cd8"/>
    <rect x="374" y="392" width="52" height="108" rx="5" fill="#d8eefb"/>
    <!-- Markise -->
    <g>
      <path d="M340 350 h 120 l 14 26 h -148 z" fill="#219cd8"/>
      <path d="M340 350 h 24 l -7 26 h -31 z M388 350 h 24 l 0 26 h -26 z M436 350 h 24 l 14 26 h -31 z" fill="#ffffff" opacity="0.85"/>
    </g>
  </g>

  <!-- 1974-Wimpel -->
  <g transform="translate(570 160)">
