    <circle r="66" fill="none" stroke="#ffffff" stroke-width="5" stroke-dasharray="4 10" stroke-linecap="round"/>
    <text x="0" y="4" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="30" fill="#ffffff">1974</text>
    <text x="0" y="28" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#d8eefb">Familienbetrieb</text>
  </g>

  <!-- Herz + Funkeln -->
  <g transform="translate(180 150)">
    <path d="M0 26 C -26 2 -18 -30 4 -26 C 14 -24 18 -16 20 -10 C 22 -16 26 -24 36 -26 C 58 -30 66 2 40 26 L 20 44 Z" fill="#45b3e7" transform="translate(-20 0)"/>
