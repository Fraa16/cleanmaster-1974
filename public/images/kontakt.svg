<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="Illustration Kontakt und Angebot">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eef8fd"/>
      <stop offset="1" stop-color="#d8eefb"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <circle cx="400" cy="300" r="230" fill="#ffffff" opacity="0.55"/>

  <!-- Angebots-Dokument -->
  <g transform="translate(280 120)">
    <rect width="240" height="330" rx="16" fill="#ffffff"/>
    <rect width="240" height="330" rx="16" fill="none" stroke="#d8eefb" stroke-width="5"/>
    <rect x="24" y="28" width="110" height="18" rx="9" fill="#16243d"/>
    <g stroke="#d8eefb" stroke-width="10" stroke-linecap="round">
      <path d="M24 82 H 216"/>
      <path d="M24 116 H 216"/>
      <path d="M24 150 H 170"/>
    </g>
    <!-- Festpreis-Stempel -->
    <g transform="translate(120 240) rotate(-8)">
      <rect x="-86" y="-30" width="172" height="60" rx="14" fill="none" stroke="#219cd8" stroke-width="5"/>
      <text x="0" y="8" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold" font-size="24" fill="#219cd8">FESTPREIS</text>
    </g>
  </g>

  <!-- Telefon -->
  <g transform="translate(560 320)">
    <rect x="-50" y="-90" width="120" height="210" rx="24" fill="#16243d"/>
    <rect x="-38" y="-76" width="96" height="166" rx="14" fill="#219cd8"/>
    <circle cx="10" cy="104" r="9" fill="#d8eefb"/>
    <path d="m-14 6 16 16 32 -36" fill="none" stroke="#ffffff" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Sprechblase -->
  <g transform="translate(200 220)">
    <path d="M-60 -40 h 120 a 20 20 0 0 1 20 20 v 50 a 20 20 0 0 1 -20 20 h -70 l -28 26 v -26 h -22 a 20 20 0 0 1 -20 -20 v -50 a 20 20 0 0 1 20 -20 z" fill="#45b3e7"/>
    <g fill="#ffffff">
      <circle cx="-30" cy="5" r="7"/>
      <circle cx="0" cy="5" r="7"/>
      <circle cx="30" cy="5" r="7"/>
    </g>
  </g>

  <!-- Funkeln -->
  <g fill="#219cd8">
    <path d="M620 140c2.6 12 7.8 17.2 20 20-12.2 2.6-17.4 7.8-20 20-2.6-12.2-7.8-17.4-20-20 12.2-2.8 17.4-8 20-20z" opacity="0.85"/>
    <path d="M160 420c1.8 8.4 5.5 12 14 14-8.5 1.8-12.2 5.5-14 14-1.8-8.5-5.5-12.2-14-14 8.5-2 12.2-5.6 14-14z" opacity="0.7"/>
  </g>
</svg>
